<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZONE Admin — Menu Items</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* ── Section tabs ───────────────────────────────── */
        .section-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .section-tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.08);
            background: rgba(255,255,255,.04);
            color: #B5B5B5;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .25s ease;
        }
        .section-tab:hover { border-color: rgba(212,175,55,.3); color: #fff; }
        .section-tab.active {
            background: var(--gold-dim);
            border-color: var(--gold);
            color: var(--gold);
        }
        .section-tab .tab-count {
            background: rgba(212,175,55,.2);
            color: var(--gold);
            border-radius: 999px;
            padding: 2px 8px;
            font-size: .72rem;
            font-weight: 700;
        }
        .section-tab.active .tab-count { background: rgba(212,175,55,.35); }

        /* ── Toolbar ─────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 999px;
            padding: 9px 18px;
            flex: 1;
            min-width: 200px;
            transition: border-color .25s;
        }
        .search-wrap:focus-within { border-color: var(--gold); }
        .search-wrap i { color: var(--gold); opacity: .6; }
        .search-wrap input {
            background: none;
            border: none;
            color: #fff;
            width: 100%;
            font-size: .9rem;
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,.3); }
        .view-toggle {
            display: flex;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px;
            overflow: hidden;
        }
        .view-btn {
            padding: 9px 14px;
            background: transparent;
            color: #B5B5B5;
            border: none;
            cursor: pointer;
            transition: all .2s;
        }
        .view-btn.active { background: rgba(212,175,55,.15); color: var(--gold); }
    </style>
    <style>
        /* ── Item card grid ──────────────────────────────── */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }
        .item-card {
            background: #1E1E1E;
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 18px;
            overflow: hidden;
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
            cursor: pointer;
            animation: cardIn .3s ease backwards;
        }
        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0,0,0,.4);
            border-color: rgba(212,175,55,.25);
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .item-card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            background: #1e1e1e;
        }
        .item-card-img-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(212,175,55,.3);
            font-size: 2.5rem;
        }
        .item-card-body { padding: 16px; }
        .item-card-name {
            font-weight: 600;
            font-size: .95rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
        }
        .item-card-desc {
            font-size: .78rem;
            color: #B5B5B5;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .item-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-top: 1px solid rgba(255,255,255,.05);
            background: rgba(255,255,255,.02);
        }
        .item-price { color: #D4AF37; font-weight: 700; font-size: .95rem; }
        .item-actions { display: flex; gap: 6px; }
        .icon-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,.08);
            background: transparent;
            color: #B5B5B5;
            display: flex; align-items: center; justify-content: center;
            font-size: .8rem;
            cursor: pointer;
            transition: all .2s;
        }
        .icon-btn:hover { background: rgba(212,175,55,.15); color: #D4AF37; border-color: #D4AF37; }
        .icon-btn.danger:hover { background: rgba(255,77,77,.15); color: #ff4d4d; border-color: #ff4d4d; }

        /* ── Slide-in form drawer ────────────────────────── */
        .form-drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(4px);
            z-index: 998;
            opacity: 0; pointer-events: none;
            transition: opacity .3s ease;
        }
        .form-drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .form-drawer {
            position: fixed;
            top: 0; right: -520px;
            width: min(500px, 100vw);
            height: 100vh;
            background: #151515;
            border-left: 1px solid rgba(212,175,55,.15);
            z-index: 999;
            display: flex; flex-direction: column;
            transition: right .35s cubic-bezier(.22,.61,.36,1);
            box-shadow: -20px 0 60px rgba(0,0,0,.5);
        }
        .form-drawer.open { right: 0; }
        .drawer-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 24px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            flex-shrink: 0;
        }
        .drawer-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.2rem;
        }
        .drawer-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.1);
            background: transparent;
            color: #B5B5B5;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s;
        }
        .drawer-close:hover { background: rgba(255,77,77,.15); color: var(--danger); border-color: var(--danger); }
        .drawer-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .drawer-footer {
            padding: 18px 24px;
            border-top: 1px solid rgba(255,255,255,.06);
            display: flex; gap: 10px;
            flex-shrink: 0;
        }

        /* Image preview inside drawer */
        .img-preview {
            width: 100%; height: 160px;
            border-radius: 12px;
            overflow: hidden;
            background: #1e1e1e;
            border: 1px solid rgba(255,255,255,.08);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 4px;
        }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
        .img-preview-empty { color: rgba(212,175,55,.3); font-size: 2rem; }

        /* Featured toggle */
        .toggle-group { display: flex; gap: 8px; }
        .toggle-option {
            flex: 1; padding: 9px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.08);
            background: transparent;
            color: #B5B5B5;
            font-size: .82rem;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
        }
        .toggle-option.selected { background: rgba(212,175,55,.15); color: var(--gold); border-color: var(--gold); }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: #B5B5B5;
        }
        .empty-state i { font-size: 3rem; color: rgba(212,175,55,.3); display: block; margin-bottom: 16px; }
    </style>
</head>
<body>

<div id="auth-loading"><h2>OZONE</h2><div class="spinner"></div></div>

<!-- Form drawer overlay -->
<div class="form-drawer-overlay" id="drawer-overlay"></div>

<!-- Slide-in form drawer -->
<div class="form-drawer" id="form-drawer">
    <div class="drawer-header">
        <span class="drawer-title" id="drawer-title">Add Item</span>
        <button class="drawer-close" id="drawer-close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="drawer-body">
        <!-- Image preview -->
        <div class="img-preview" id="img-preview">
            <span class="img-preview-empty"><i class="fas fa-image"></i></span>
        </div>
        <div class="form-group">
            <label>Image URL</label>
            <input class="form-control" id="f-image" placeholder="assets/images/foods/…" oninput="previewImage(this.value)">
        </div>
        <div class="form-group">
            <label>Name *</label>
            <input class="form-control" id="f-name" placeholder="Item name">
        </div>
        <div class="form-group">
            <label>Price (ETB) *</label>
            <input class="form-control" id="f-price" type="number" placeholder="0" min="0">
        </div>
        <div class="form-group">
            <label>Subcategory</label>
            <input class="form-control" id="f-subcategory" placeholder="e.g. Espresso, Steak…">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea class="form-control" id="f-description" rows="3"
                style="resize:vertical" placeholder="Short description of the item"></textarea>
        </div>
        <div class="form-group">
            <label>Calories</label>
            <input class="form-control" id="f-calories" type="number" placeholder="0">
        </div>
        <div class="form-group">
            <label>Prep Time</label>
            <input class="form-control" id="f-preptime" placeholder="e.g. 15 min">
        </div>
        <div class="form-group">
            <label>Rating (0–5)</label>
            <input class="form-control" id="f-rating" type="number" min="0" max="5" step="0.1" placeholder="4.5">
        </div>
        <div class="form-group">
            <label>Available</label>
            <div class="toggle-group">
                <button class="toggle-option selected" data-field="available" data-value="true" onclick="selectToggle(this)">
                    <i class="fas fa-check-circle"></i> Yes
                </button>
                <button class="toggle-option" data-field="available" data-value="false" onclick="selectToggle(this)">
                    <i class="fas fa-times-circle"></i> No
                </button>
            </div>
        </div>
        <div class="form-group">
            <label>Featured</label>
            <div class="toggle-group">
                <button class="toggle-option" data-field="featured" data-value="true" onclick="selectToggle(this)">
                    <i class="fas fa-star"></i> Yes
                </button>
                <button class="toggle-option selected" data-field="featured" data-value="false" onclick="selectToggle(this)">
                    <i class="far fa-star"></i> No
                </button>
            </div>
        </div>
    </div>
    <div class="drawer-footer">
        <button class="btn btn-primary" id="save-btn" style="flex:1">
            <i class="fas fa-floppy-disk"></i> Save Item
        </button>
        <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
    </div>
</div>

<div class="admin-layout" id="app" style="display:none">
    <aside id="sidebar"></aside>
    <main class="admin-main">

        <div class="page-header">
            <div>
                <h1 class="page-title">Menu Items</h1>
                <p class="page-subtitle">Manage items across all sections</p>
            </div>
            <button class="btn btn-primary" id="add-btn">
                <i class="fas fa-plus"></i> Add Item
            </button>
        </div>

        <!-- Section tabs -->
        <div class="section-tabs" id="section-tabs">
            <button class="section-tab active" data-sheet="Cafe">
                <i class="fas fa-mug-hot"></i> Cafe
                <span class="tab-count" id="count-Cafe">—</span>
            </button>
            <button class="section-tab" data-sheet="Restaurant">
                <i class="fas fa-utensils"></i> Restaurant
                <span class="tab-count" id="count-Restaurant">—</span>
            </button>
            <button class="section-tab" data-sheet="Bar">
                <i class="fas fa-martini-glass"></i> Bar
                <span class="tab-count" id="count-Bar">—</span>
            </button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="fas fa-search"></i>
                <input id="search-input" type="text" placeholder="Search items…">
            </div>
            <select class="form-control" id="filter-available" style="max-width:150px">
                <option value="all">All Status</option>
                <option value="true">Available</option>
                <option value="false">Hidden</option>
            </select>
            <select class="form-control" id="sort-select" style="max-width:150px">
                <option value="name">Name A→Z</option>
                <option value="price-asc">Price ↑</option>
                <option value="price-desc">Price ↓</option>
                <option value="featured">Featured First</option>
            </select>
            <div class="view-toggle">
                <button class="view-btn active" id="view-grid" title="Grid view"><i class="fas fa-grip"></i></button>
                <button class="view-btn" id="view-list" title="List view"><i class="fas fa-list"></i></button>
            </div>
        </div>

        <!-- Items output -->
        <div id="items-output"></div>

    </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/sidebar.js"></script>
<script>
"use strict";

// ── State ────────────────────────────────────────────────
let _currentSheet = "Cafe";
let _allItems     = { Cafe: [], Restaurant: [], Bar: [] };
let _editingId    = null;
let _viewMode     = "grid";   // "grid" | "list"

// ── Boot ─────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
    const session = OzoneAuth.requireAuth();
    if (!session) return;

    document.getElementById("auth-loading").style.display = "none";
    document.getElementById("app").style.display = "grid";
    renderSidebar("foods");
    OzoneAuth.populateSidebar(session);

    // Load all three sheets in parallel
    await loadAll();

    // ── Tab switching ────────────────────────────────────
    document.getElementById("section-tabs").addEventListener("click", e => {
        const tab = e.target.closest("[data-sheet]");
        if (!tab) return;
        document.querySelectorAll(".section-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        _currentSheet = tab.dataset.sheet;
        renderItems();
    });

    // ── Add button ───────────────────────────────────────
    document.getElementById("add-btn").addEventListener("click", () => openDrawer());

    // ── Drawer close ─────────────────────────────────────
    document.getElementById("drawer-close").addEventListener("click", closeDrawer);
    document.getElementById("cancel-btn").addEventListener("click",   closeDrawer);
    document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
    document.getElementById("save-btn").addEventListener("click", saveItem);

    // ── Search / filter / sort ───────────────────────────
    document.getElementById("search-input").addEventListener("input",    renderItems);
    document.getElementById("filter-available").addEventListener("change", renderItems);
    document.getElementById("sort-select").addEventListener("change",     renderItems);

    // ── View toggle ──────────────────────────────────────
    document.getElementById("view-grid").addEventListener("click", () => setView("grid"));
    document.getElementById("view-list").addEventListener("click", () => setView("list"));
});

// ── Load all sheets ──────────────────────────────────────
async function loadAll() {
    await Promise.all(["Cafe","Restaurant","Bar"].map(loadSheet));
}

async function loadSheet(sheet) {
    try {
        const data = await OzoneUtils.apiGet({ action: "getSheetItems", sheet });
        const items = Array.isArray(data) ? data : (data.items || []);
        _allItems[sheet] = items;
        console.log(sheet + " loaded:", items.length, "items. First item:", JSON.stringify(items[0]));
        const badge = document.getElementById("count-" + sheet);
        if (badge) badge.textContent = items.length;
        if (sheet === _currentSheet) renderItems();
    } catch (err) {
        OzoneUtils.toast("Failed to load " + sheet + ": " + err.message, "error");
    }
}

// ── Render ───────────────────────────────────────────────
function renderItems() {
    const q         = document.getElementById("search-input").value.toLowerCase();
    const avFilter  = document.getElementById("filter-available").value;
    const sort      = document.getElementById("sort-select").value;
    const output    = document.getElementById("items-output");

    let items = [...(_allItems[_currentSheet] || [])];

    // Search
    if (q) items = items.filter(i =>
        (i.name        || "").toLowerCase().includes(q) ||
        (i.description || "").toLowerCase().includes(q) ||
        (i.subcategory || "").toLowerCase().includes(q)
    );

    // Filter
    if (avFilter !== "all")
        items = items.filter(i => String(i.available ?? "true") === avFilter);

    // Sort
    if (sort === "name")        items.sort((a,b) => (a.name||"").localeCompare(b.name||""));
    if (sort === "price-asc")   items.sort((a,b) => (Number(a.price)||0) - (Number(b.price)||0));
    if (sort === "price-desc")  items.sort((a,b) => (Number(b.price)||0) - (Number(a.price)||0));
    if (sort === "featured")    items.sort((a,b) => (b.featured==="TRUE"||b.featured===true?1:0) - (a.featured==="TRUE"||a.featured===true?1:0));

    if (!items.length) {
        output.innerHTML = `<div class="items-grid"><div class="empty-state">
            <i class="fas fa-bowl-food"></i>
            <p>No items found. Add your first ${_currentSheet} item.</p>
        </div></div>`;
        return;
    }

    if (_viewMode === "grid") {
        output.innerHTML = `<div class="items-grid">${items.map((item,i) => cardHTML(item,i)).join("")}</div>`;
    } else {
        output.innerHTML = `<div class="panel"><table class="data-table">
            <thead><tr><th>Image</th><th>Name</th><th>Subcategory</th><th>Price</th><th>Calories</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>${items.map(item => rowHTML(item)).join("")}</tbody>
        </table></div>`;
    }
}

function cardHTML(item, idx) {
    const rawImg = item.image || item.Image || "";
    // Prefix relative paths with ../ since admin pages are inside /admin/
    const img    = rawImg && !rawImg.startsWith("http") && !rawImg.startsWith("../")
                   ? "../" + rawImg : rawImg;
    const name   = OzoneUtils.escape(item.name || item.Name || "Unnamed");
    const desc   = OzoneUtils.escape(item.description || item.Description || "");
    const price  = Number(item.price || item.Price || 0);
    const avail  = item.available !== "FALSE" && item.available !== false;
    const feat   = item.featured  === "TRUE"  || item.featured  === true;
    const id     = OzoneUtils.escape(String(item.id || item.ID || idx));

    const icons = { Cafe: "fa-mug-hot", Restaurant: "fa-utensils", Bar: "fa-martini-glass" };
    const tabIcon = icons[_currentSheet] || "fa-bowl-food";

    const imgHTML = img
        ? `<img class="item-card-img" src="${OzoneUtils.escape(img)}" alt="${name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : "";

    const placeholderHTML = `<div class="item-card-img-placeholder" ${img ? 'style="display:none"' : ""}>
        <div style="text-align:center">
            <i class="fas ${tabIcon}" style="display:block;margin-bottom:8px"></i>
            <span style="font-size:.7rem;opacity:.5;color:#D4AF37;letter-spacing:1px;text-transform:uppercase">${OzoneUtils.escape(item.subcategory || _currentSheet)}</span>
        </div>
    </div>`;

    return `
    <div class="item-card" style="animation-delay:${idx * 0.04}s">
        ${imgHTML}${placeholderHTML}
        <div class="item-card-body">
            <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:#D4AF37;opacity:.7;margin-bottom:5px">${OzoneUtils.escape(item.subcategory || "")}</div>
            <div class="item-card-name">${name}</div>
            <div class="item-card-desc">${desc || "No description."}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
                <span style="padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:600;background:${avail ? "rgba(26,163,122,.18)" : "rgba(255,77,77,.18)"};color:${avail ? "#1AA37A" : "#ff4d4d"}">
                    ${avail ? "✓ Available" : "✗ Hidden"}
                </span>
                ${feat ? `<span style="padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:600;background:rgba(212,175,55,.18);color:#D4AF37">★ Featured</span>` : ""}
            </div>
        </div>
        <div class="item-card-footer">
            <span class="item-price">${OzoneUtils.formatCurrency(price)}</span>
            <div class="item-actions">
                <button class="icon-btn" title="Edit" onclick="event.stopPropagation();editItem('${id}')"><i class="fas fa-pen"></i></button>
                <button class="icon-btn danger" title="Delete" onclick="event.stopPropagation();deleteItem('${id}')"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>`;
}

function rowHTML(item) {
    const rawImg = item.image || item.Image || "";
    const img    = rawImg && !rawImg.startsWith("http") && !rawImg.startsWith("../")
                   ? "../" + rawImg : rawImg;
    const name  = OzoneUtils.escape(item.name || "—");
    const sub   = OzoneUtils.escape(item.subcategory || "—");
    const price = Number(item.price || 0);
    const cal   = item.calories || "—";
    const avail = item.available !== "FALSE" && item.available !== false;
    const id    = OzoneUtils.escape(String(item.id || ""));
    return `<tr>
        <td>${img ? `<img src="${OzoneUtils.escape(img)}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">` : "—"}</td>
        <td style="font-weight:500">${name}</td>
        <td><span class="badge badge-gray">${sub}</span></td>
        <td>${OzoneUtils.formatCurrency(price)}</td>
        <td>${OzoneUtils.escape(String(cal))}</td>
        <td><span class="badge ${avail ? "badge-success" : "badge-danger"}">${avail ? "Available" : "Hidden"}</span></td>
        <td style="display:flex;gap:6px">
            <button class="btn btn-success" style="padding:5px 10px;font-size:.78rem" onclick="editItem('${id}')"><i class="fas fa-pen"></i></button>
            <button class="btn btn-danger"  style="padding:5px 10px;font-size:.78rem" onclick="deleteItem('${id}')"><i class="fas fa-trash"></i></button>
        </td>
    </tr>`;
}

// ── View mode ─────────────────────────────────────────────
function setView(mode) {
    _viewMode = mode;
    document.getElementById("view-grid").classList.toggle("active", mode === "grid");
    document.getElementById("view-list").classList.toggle("active", mode === "list");
    renderItems();
}

// ── Drawer open/close ─────────────────────────────────────
function openDrawer(item = null) {
    _editingId = item ? String(item.id || item.ID || "") : null;
    document.getElementById("drawer-title").textContent = item ? "Edit Item" : "Add Item — " + _currentSheet;
    document.getElementById("f-name").value        = item?.name        || item?.Name        || "";
    document.getElementById("f-price").value       = item?.price       || item?.Price       || "";
    document.getElementById("f-subcategory").value = item?.subcategory || item?.Subcategory || "";
    document.getElementById("f-description").value = item?.description || item?.Description || "";
    document.getElementById("f-calories").value    = item?.calories    || item?.Calories    || "";
    document.getElementById("f-preptime").value    = item?.prepTime    || item?.PrepTime    || "";
    document.getElementById("f-rating").value      = item?.rating      || item?.Rating      || "";
    const imgVal = item?.image || item?.Image || "";
    document.getElementById("f-image").value = imgVal;
    previewImage(imgVal);
    setToggle("available", String(item?.available ?? "true") !== "FALSE" && (item?.available ?? true) !== false ? "true" : "false");
    setToggle("featured",  (item?.featured === "TRUE" || item?.featured === true) ? "true" : "false");
    document.getElementById("form-drawer").classList.add("open");
    document.getElementById("drawer-overlay").classList.add("open");
    document.body.style.overflow = "hidden";
}

function closeDrawer() {
    document.getElementById("form-drawer").classList.remove("open");
    document.getElementById("drawer-overlay").classList.remove("open");
    document.body.style.overflow = "";
    _editingId = null;
}

// ── Image preview ─────────────────────────────────────────
function previewImage(url) {
    const el = document.getElementById("img-preview");
    if (url && url.trim()) {
        // Resolve relative paths from the admin folder
        const src = url && !url.startsWith("http") && !url.startsWith("../")
                    ? "../" + url : url;
        el.innerHTML = `<img src="${OzoneUtils.escape(src)}" onerror="this.parentElement.innerHTML='<span class=img-preview-empty><i class=fas fa-image></i></span>'">`;
    } else {
        el.innerHTML = `<span class="img-preview-empty"><i class="fas fa-image"></i></span>`;
    }
}

// ── Toggle buttons ────────────────────────────────────────
function selectToggle(btn) {
    const field = btn.dataset.field;
    document.querySelectorAll(`[data-field="${field}"]`).forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
}
function setToggle(field, value) {
    document.querySelectorAll(`[data-field="${field}"]`).forEach(b => {
        b.classList.toggle("selected", b.dataset.value === value);
    });
}
function getToggle(field) {
    const sel = document.querySelector(`[data-field="${field}"].selected`);
    return sel ? sel.dataset.value : "true";
}

// ── CRUD ──────────────────────────────────────────────────
async function saveItem() {
    const name = document.getElementById("f-name").value.trim();
    const price= document.getElementById("f-price").value;
    if (!name || !price) { OzoneUtils.toast("Name and price are required.", "warn"); return; }

    const payload = {
        action:      _editingId ? "updateSheetItem" : "addSheetItem",
        sheet:       _currentSheet,
        id:          _editingId || "",
        name,
        price:       Number(price),
        subcategory: document.getElementById("f-subcategory").value.trim(),
        description: document.getElementById("f-description").value.trim(),
        calories:    document.getElementById("f-calories").value,
        prepTime:    document.getElementById("f-preptime").value.trim(),
        rating:      document.getElementById("f-rating").value,
        image:       document.getElementById("f-image").value.trim(),
        available:   getToggle("available"),
        featured:    getToggle("featured"),
        category:    _currentSheet.toLowerCase()
    };

    const saveBtn = document.getElementById("save-btn");
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

    try {
        const res = await OzoneUtils.apiPost(payload);
        if (res.success) {
            OzoneUtils.toast(_editingId ? "Item updated." : "Item added.");
            closeDrawer();
            await loadSheet(_currentSheet);
        } else {
            OzoneUtils.toast(res.message || "Save failed.", "error");
        }
    } catch (err) {
        OzoneUtils.toast(err.message, "error");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-floppy-disk"></i> Save Item';
    }
}

async function editItem(id) {
    try {
        const data = await OzoneUtils.apiGet({ action: "getSheetItem", sheet: _currentSheet, id });
        const item = data.item || data;
        openDrawer(item);
    } catch (err) {
        OzoneUtils.toast("Could not load item: " + err.message, "error");
    }
}

async function deleteItem(id) {
    if (!confirm("Delete this item permanently?")) return;
    try {
        const res = await OzoneUtils.apiPost({ action: "deleteSheetItem", sheet: _currentSheet, id });
        if (res.success) {
            OzoneUtils.toast("Item deleted.");
            await loadSheet(_currentSheet);
        } else {
            OzoneUtils.toast(res.message || "Delete failed.", "error");
        }
    } catch (err) {
        OzoneUtils.toast(err.message, "error");
    }
}
</script>
