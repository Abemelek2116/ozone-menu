<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZONE Admin — Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Google Identity Services — loaded synchronously so it is ready before login.js runs -->
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #090909;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient glow */
        .bg-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(212,175,55,.15), transparent 65%);
            filter: blur(80px);
            pointer-events: none;
            animation: floatGlow 8s ease-in-out infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes floatGlow {
            0%,100% { transform: translate(-50%, -50%) scale(1); }
            50%      { transform: translate(-50%, -54%) scale(1.05); }
        }

        /* Card */
        .login-card {
            position: relative;
            width: min(400px, 92vw);
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(212,175,55,.18);
            backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,.55);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #D4AF37;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }

        .brand-sub {
            font-size: .75rem;
            color: rgba(255,255,255,.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: rgba(212,175,55,.3);
            margin: 0 auto 32px;
        }

        /* Google button container */
        #google-btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            transition: opacity .3s ease;
        }

        /* Status / spinner */
        #login-status {
            font-size: .875rem;
            color: #D4AF37;
            margin-bottom: 12px;
        }

        #login-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(212,175,55,.2);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        #login-error {
            font-size: .85rem;
            color: #ff4d4d;
            background: rgba(255,77,77,.1);
            border: 1px solid rgba(255,77,77,.2);
            border-radius: 10px;
            padding: 10px 14px;
            margin-top: 6px;
        }

        .footer-note {
            margin-top: 28px;
            font-size: .72rem;
            color: rgba(255,255,255,.2);
            letter-spacing: .5px;
        }
    </style>
</head>

<body>

<div class="bg-glow"></div>

<div class="login-card">

    <h1 class="brand">OZONE</h1>
    <p class="brand-sub">Admin Portal</p>
    <div class="divider"></div>

    <!-- Loading spinner (hidden by default) -->
    <div id="login-spinner" hidden></div>

    <!-- Status message -->
    <p id="login-status" hidden></p>

    <!-- Google Sign-In button rendered here by GIS -->
    <div id="google-btn-container"></div>

    <!-- Error message -->
    <p id="login-error" hidden></p>

    <p class="footer-note">Access restricted to authorised personnel only.</p>

</div>

<!-- Config must come first -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
