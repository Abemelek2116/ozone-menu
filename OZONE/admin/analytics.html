<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZONE Admin — Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Simple bar chart built with CSS — no external lib needed */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 180px;
            padding: 0 4px;
            margin-top: 16px;
        }
        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 6px;
        }
        .bar-fill {
            width: 100%;
            background: linear-gradient(to top, #D4AF37, rgba(212,175,55,.4));
            border-radius: 6px 6px 0 0;
            min-height: 4px;
            transition: height .6s ease;
        }
        .bar-label {
            font-size: .7rem;
            color: #B5B5B5;
            white-space: nowrap;
        }
        .bar-value {
            font-size: .72rem;
            color: #D4AF37;
            font-weight: 600;
        }

        /* Top items list */
        .top-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .top-item:last-child { border-bottom: none; }
        .top-item-rank {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(212,175,55,.15);
            color: #D4AF37;
            font-size: .75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-item-name { flex: 1; padding: 0 12px; font-size: .875rem; }
        .top-item-count { color: #B5B5B5; font-size: .82rem; }
    </style>
</head>
<body>

<div id="auth-loading">
    <h2>OZONE</h2>
    <div class="spinner"></div>
</div>

<div class="admin-layout" id="app" style="display:none">

    <aside id="sidebar"></aside>

    <main class="admin-main">

        <div class="page-header">
            <div>
                <h1 class="page-title">Analytics</h1>
                <p class="page-subtitle">Business Intelligence Overview</p>
            </div>
            <select class="form-control" id="period-select" style="max-width:160px">
                <option value="7">Last 7 days</option>
                <option value="30" selected>Last 30 days</option>
                <option value="90">Last 90 days</option>
            </select>
        </div>

        <!-- KPI row -->
        <div class="cards-grid">
            <div class="stat-card">
                <p class="label">Total Revenue</p>
                <p class="value" id="kpi-revenue">—</p>
            </div>
            <div class="stat-card">
                <p class="label">Total Orders</p>
                <p class="value" id="kpi-orders">—</p>
            </div>
            <div class="stat-card">
                <p class="label">Avg Order Value</p>
                <p class="value" id="kpi-avg">—</p>
            </div>
            <div class="stat-card">
                <p class="label">Unique Customers</p>
                <p class="value" id="kpi-customers">—</p>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px">

            <!-- Revenue chart -->
            <div class="panel">
                <h2 class="panel-title">Revenue Over Time</h2>
                <div class="bar-chart" id="revenue-chart">
                    <p style="color:#B5B5B5;font-size:.875rem;align-self:center;width:100%;text-align:center">Loading…</p>
                </div>
            </div>

            <!-- Top selling items -->
            <div class="panel">
                <h2 class="panel-title">Top Selling Items</h2>
                <div id="top-items">
                    <p style="color:#B5B5B5;font-size:.875rem;text-align:center;padding:20px">Loading…</p>
                </div>
            </div>

        </div>

        <!-- Extra stats row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:0">
            <div class="panel">
                <h2 class="panel-title">Peak Hour</h2>
                <p id="stat-peak" style="font-size:2rem;font-family:'Playfair Display',serif;color:#D4AF37;margin-top:8px">—</p>
            </div>
            <div class="panel">
                <h2 class="panel-title">Best Category</h2>
                <p id="stat-cat" style="font-size:1.4rem;font-family:'Playfair Display',serif;color:#D4AF37;margin-top:8px">—</p>
            </div>
            <div class="panel">
                <h2 class="panel-title">Table Turnover Rate</h2>
                <p id="stat-turnover" style="font-size:2rem;font-family:'Playfair Display',serif;color:#D4AF37;margin-top:8px">—</p>
            </div>
        </div>

    </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/sidebar.js"></script>
<script>
"use strict";

document.addEventListener("DOMContentLoaded", async () => {

    const session = OzoneAuth.requireAuth();
    if (!session) return;

    document.getElementById("auth-loading").style.display = "none";
    document.getElementById("app").style.display = "grid";

    renderSidebar("analytics");
    OzoneAuth.populateSidebar(session);

    await loadAnalytics();

    document.getElementById("period-select").addEventListener("change", loadAnalytics);
});

async function loadAnalytics() {
    const days = document.getElementById("period-select").value;
    try {
        const data = await OzoneUtils.apiGet({ action: "getAnalytics", days });
        renderKPIs(data);
        renderChart(data.revenueByDay || []);
        renderTopItems(data.topItems || []);
        renderExtras(data);
    } catch (err) {
        OzoneUtils.toast("Analytics unavailable: " + err.message, "error");
    }
}

function renderKPIs(data) {
    document.getElementById("kpi-revenue").textContent   = OzoneUtils.formatCurrency(data.totalRevenue || 0);
    document.getElementById("kpi-orders").textContent    = (data.totalOrders   || 0).toLocaleString();
    document.getElementById("kpi-avg").textContent       = OzoneUtils.formatCurrency(data.avgOrderValue || 0);
    document.getElementById("kpi-customers").textContent = (data.uniqueCustomers || 0).toLocaleString();
}

function renderChart(days) {
    const chart = document.getElementById("revenue-chart");
    if (!days.length) {
        chart.innerHTML = `<p style="color:#B5B5B5;font-size:.875rem;align-self:center;width:100%;text-align:center">No data for this period.</p>`;
        return;
    }
    const max = Math.max(...days.map(d => d.revenue || 0)) || 1;
    chart.innerHTML = days.map(d => {
        const pct = Math.round(((d.revenue || 0) / max) * 100);
        return `
            <div class="bar-col">
                <span class="bar-value">${d.revenue ? OzoneUtils.formatCurrency(d.revenue).replace("Br ","") : ""}</span>
                <div class="bar-fill" style="height:${pct}%"></div>
                <span class="bar-label">${OzoneUtils.escape(d.label || d.date || "")}</span>
            </div>`;
    }).join("");
}

function renderTopItems(items) {
    const el = document.getElementById("top-items");
    if (!items.length) {
        el.innerHTML = `<p style="color:#B5B5B5;font-size:.875rem;text-align:center;padding:20px">No data.</p>`;
        return;
    }
    el.innerHTML = items.slice(0, 6).map((item, i) => `
        <div class="top-item">
            <span class="top-item-rank">${i + 1}</span>
            <span class="top-item-name">${OzoneUtils.escape(item.name || "—")}</span>
            <span class="top-item-count">${(item.count || 0).toLocaleString()} sold</span>
        </div>`).join("");
}

function renderExtras(data) {
    document.getElementById("stat-peak").textContent     = data.peakHour     || "—";
    document.getElementById("stat-cat").textContent      = data.bestCategory || "—";
    document.getElementById("stat-turnover").textContent = data.tableTurnover ? `${data.tableTurnover}×` : "—";
}
</script>
</body>
</html>
